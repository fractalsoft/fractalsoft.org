translations:
  en:
    title: Amenitiz
    subtitle: hotel management application
    introduction: >
      A comprehensive property management platform for short-term rental owners and managers.
      It streamlines reservations, channel distribution, and guest communications.
    description: >
      We partnered on backend and platform work focused on invoice and integration reliability.
      The goal was to reduce manual handling and improve long-term maintainability.
    challenge_summary: >
      Invoicing and partner integrations required repeated manual intervention, creating delays
      and avoidable operational risk.
    solution_summary: >
      We implemented workflow automation and integration hardening to make invoice handling
      and backend communication more reliable.
    outcome_summary: >
      The platform moved toward exception-based operations with better confidence in daily workflows.
  pl:
