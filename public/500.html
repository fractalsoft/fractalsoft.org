<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <meta http-equiv='refresh' content='30;url=https://fractalsoft.org/' />
  <meta http-equiv='X-UA-Compatible' content='IE=edge'>
  <title>500 Internal Server Error</title>
  <meta name='robots' content='noindex,nofollow,noarchive' />
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <link rel='shortcut icon' href='favicon.ico'>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Asap:wght@400;700&display=swap' rel='stylesheet'>
  <style>
  *,
  *::before,
  *::after { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Asap', Helvetica, sans-serif;
    background: #fbfbfb;
    color: #2e3641;
    -webkit-font-smoothing: antialiased;
  }
  .container { margin: 0 auto; max-width: 1140px; width: 100%; padding: 0 1.25rem; }
  .header {
    background: #fff;
    border-bottom: 1px solid #ddd;
    padding: 1rem 0 0.75rem;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
    color: #2e3641;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 1rem;
  }
  .header-brand img { display: block; width: 36px; height: auto; }
  .header .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
  }
  .header-home {
    color: #2e3641;
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: color 0.2s ease;
  }
  .header-home:hover,
  .header-home:focus { color: #ff2a25; outline: none; }
  .content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem 5rem;
  }
  .content > .container { display: flex; justify-content: center; }
  .main {
    text-align: center;
    background: #fff;
    border-radius: 12px;
    padding: 2.25rem 1.75rem;
    max-width: 36rem;
    width: 100%;
    box-shadow: 0 2px 12px rgba(46, 54, 65, 0.06);
    border: 1px solid #eee;
    border-top: 4px solid #c3261c;
  }
  .main-logo {
    display: block;
    margin: 0 auto 1.5rem;
    width: 96px;
    height: auto;
  }
  .main h1 {
    font-size: clamp(1.5rem, 4vw, 2.25rem);
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 1rem;
    color: #2e3641;
  }
  .main .lead {
    margin: 0 0 1.25rem;
    line-height: 1.5;
    color: #616060;
    font-size: 1rem;
  }
  .main .redirect {
    margin: 1rem 0 0;
    line-height: 1.5;
    color: #616060;
    font-size: 0.9375rem;
  }
  .btn {
    display: block;
    width: 100%;
    margin: 0;
    padding: 15px 20px;
    background: #c3261c;
    color: #fff !important;
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    text-align: center;
    border: none;
    border-radius: 0;
    transition: opacity 0.2s ease;
    box-sizing: border-box;
  }
  .btn:hover,
  .btn:focus { opacity: 0.92; }
  .footer {
    margin-top: auto;
    background: #2e2e2e;
    color: #fff;
    padding: 1.5rem 0;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }
  .footer-copy {
    text-align: center;
    font-size: 0.8125rem;
    color: rgba(255, 255, 255, 0.75);
  }
  @media (min-width: 600px) {
    .content { padding: 3rem 2rem 6rem; }
    .main { padding: 2.5rem 2.5rem; }
  }
  </style>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NKMWEXWYK9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NKMWEXWYK9');
  </script>
</head>
<body class='error 500'>
<div class='header'>
  <div class='container'>
    <a href='/' class='header-brand'>
      <img src='/icons/brand/fractalsoft.svg' alt='' width='36' height='36'>
      Fractal Soft
    </a>
    <a href='/' class='header-home'>Home</a>
  </div>
</div>
<div class='content'>
  <div class='container'>
    <div class='main'>
      <img class='main-logo' src='/icons/brand/fractalsoft.svg' alt='Fractal Soft' width='96' height='96'>
      <h1>500 Internal Server Error</h1>
      <p class='lead'>Something went wrong.</p>
      <a href='/' class='btn'>Homepage</a>
      <p class='redirect'>Redirecting in <span id='count'>30</span> seconds.</p>
    </div>
  </div>
</div>
<footer class='footer'>
  <div class='container'>
    <div class='footer-copy'>&copy; Fractal Soft 2018&ndash;2026</div>
  </div>
</footer>
<script>
  function ready(fn) {
    if (document.readyState != 'loading') fn();
    else document.addEventListener('DOMContentLoaded', fn);
  }
  var counter = 30;
  function countDown() {
    if (counter >= 0) {
      counter--;
      var span = document.getElementById('count');
      if (span) span.innerHTML = counter;
    }
  }
  ready(function() { setInterval(countDown, 1000); });
</script>
</body>
</html>
